<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #b1{
            background-color: red;
            color:white;
            padding:0.5rem;
            border:none;
            border-radius:2px;
            cursor:pointer;

        }
        #b1:hover{
            opacity:0.7;
            transition:opacity 0.15s;

        }

        #b1:active{
            opacity:0.5;
        }
        #b2{
            background-color: white;
            color:rgb(71, 134, 175);
            cursor:pointer;
            border-radius: 2px;
            padding:0.5rem;
            border-color:rgb(71, 134, 175);
            border-style:solid;
        }
        #b2:hover{
            background-color:rgb(71, 134, 175) ;
            color:white;
            transition:background-color 0.15s;
        }
        #b3{
            background-color: rgb(71, 134, 175);
            color:white;
            padding:0.5rem;
            border:none;
            border-radius:5rem;
            font-weight:bold;
            cursor:pointer;
        }
        #b3:hover{
            box-shadow:5px 5px 10px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <button id="b1">SUBSCRIBE</button>
    
    <button id="b2">JOIN</button>
    
    <button id="b3">Tweet</button>
    
</body>
</html>
